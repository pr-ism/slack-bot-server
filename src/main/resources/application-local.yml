slack:
  bot-token: bot-token
  signing-secret: signing-secret
  client-id: client-id
  client-secret: client-secret
  redirect-uri: redirect-url
  scopes: "chat:write,chat:write.customize,channels:read,groups:read,commands,users:read"
  command:
    messages:
      help: |-
        👋 PRism 봇 사용법

        - `/prism connect [github-id]`: 내 슬랙 계정과 깃허브 계정을 연결합니다.
        - `/prism my-page`: 내 전용 설정 링크를 받습니다.
        - `/prism help`: 이 도움말을 봅니다.
      unknown: "⚠️ 알 수 없는 명령어입니다. `/prism help`를 입력해보세요."
      connect:
        missing-github-id: "GitHub ID를 입력해주세요.\n예시: `/prism connect hello-world`"
        success: "✅ 연결되었습니다! (Slack: %s ↔ GitHub: %s)"
        fail: "❌ 연결에 실패했습니다."
      channels:
        empty: "ℹ️ 이 워크스페이스에 등록된 채널이 없습니다. 봇을 채널에 초대해 주세요."
        header: "📡 등록된 채널 목록 (이 워크스페이스):"
        line-format: "- <#%s> : `%s`"
      my-page:
        not-connected: "아직 GitHub ID가 연결되지 않았습니다. `/prism connect [GitHubID]`로 먼저 연결해주세요."
        link-message: |-
          🔗 내 전용 설정 링크
          %s
          이 링크를 가진 사람만 접근할 수 있습니다.
  event:
    messages:
      welcome: |-
        📢 반갑습니다! PR Review Assistant, PR-ism 입니다.
        
        원활한 리뷰 알림을 받기 위해, 팀원분들은 아래 명령어로 깃허브 계정을 연동해주세요!
        
        👉 `/prism connect [Github-ID]`
        예시: `/prism connect hello-world`
  reminder:
    messages:
      reviewee: |-
        리뷰가 시작되었습니다.
        리뷰어: %s
        PR: %s
      reviewer: |-
        리뷰 예약 시간이 되었습니다.
        PR: %s
  interaction:
    claim-mapping:
      messages:
        success: "✅ 등록되었습니다! (Github: %s)"
  review:
    reservation:
      time-options:
        options:
          - label: "5분 뒤"
            value: "5"
          - label: "10분 뒤"
            value: "10"
          - label: "15분 뒤"
            value: "15"
          - label: "30분 뒤"
            value: "30"
          - label: "45분 뒤"
            value: "45"
          - label: "1시간 뒤"
            value: "60"

review:
  notification:
    batch:
      window-millis: 5000

token:
  access-key: thisIsA32ByteAccessTokenKeyForHS
  refresh-key: thisIsA32ByteRefreshTokenKeyForH
  encryption-key: thisIsA32ByteEncryptionKeyForAES
  issuer: local-issuer
  access-expired-seconds: 3600
  refresh-expired-seconds: 259200
  access-expired-millis-seconds: 3600000
  refresh-expired-millis-seconds: 259200000

access-link:
  key-secret: access-link-secret

app:
  public-base-url: http://localhost:8080
  async:
    event:
      core-pool-size: 4
      max-pool-size: 8
      thread-name-prefix: slack-events-
      queue-capacity: 50
    review-interaction:
      core-pool-size: 2
      max-pool-size: 4
      thread-name-prefix: review-interaction-
      queue-capacity: 500
  interaction:
    inbox:
      block-actions:
        worker-enabled: true
        poll-delay-ms: 1000
        poll-cap-ms: 30000
        processing-timeout-ms: 60000
      view-submission:
        worker-enabled: true
        poll-delay-ms: 1000
        poll-cap-ms: 30000
        processing-timeout-ms: 60000
    outbox:
      worker-enabled: true
      poll-delay-ms: 1000
      poll-cap-ms: 30000
      processing-timeout-ms: 60000
    retry:
      inbox:
        max-attempts: 2
        initial-delay-ms: 100
        multiplier: 2.0
        max-delay-ms: 1000
      outbox:
        max-attempts: 2
        initial-delay-ms: 100
        multiplier: 2.0
        max-delay-ms: 1000

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
  allowed-origin-patterns: []
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  exposed-headers: []
  max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
      base-path: /local-actuator
  endpoint:
    health:
      show-components: always
  server:
    port: 8888
